name: Scan
type: script
author: 2a2IgZ2kiAqXSGqu
img: systems/lancer/assets/icons/macro-icons/sensor.svg
scope: global
command: >-
  const target = game.user.targets.first();

  const actor = game.user.character
    || canvas.tokens.controlled[0]?.document?.actor
    || canvas.scene.tokens.find(t => t.isOwner)?.actor;
  console.log(actor);

  if (actor) {
    return actor.beginScanFlow(target);
  }


  ui.notifications.error("You do not own any tokens in the current scene to
  initiate a scan from!");
