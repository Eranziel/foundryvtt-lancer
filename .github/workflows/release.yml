name: Release Creation

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Load the system.json manifest into memory
      - name: Load system manifest
        id: manifest
        uses: zoexx/github-action-json-file-properties@release
        with:
          file_path: "./src/system.json"

      # Set up variables for future use
      - name: Set up variables
        id: vars
        # Remove the 'v' from the tag for versioning
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAG_NAME=${GITHUB_REF_NAME}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "zip_name=lancer-$TAG_NAME.zip" >> $GITHUB_OUTPUT

      # Set up Node
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Build the code and packs for distribution
      - name: Build For Distribution
        run: npm run build

      # Package the built files
      - name: Package Files
        run: |
          cd dist
          zip -r "${{ steps.vars.outputs.zip_name }}" *

      - name: Archive release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: dist/${{ steps.vars.outputs.zip_name }}